events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ปิดการแสดงเวอร์ชัน Nginx เพื่อความปลอดภัย
    server_tokens off;

    # ประกาศ Upstream กลุ่มเว็บเซิร์ฟเวอร์หลังบ้าน 2 เครื่อง
    upstream web_servers {
        server app-1:80;
        server app-2:80;
    }

    server {
        listen 80;
        server_name localhost;

        # บันทึก log การใช้งานทั้งหมดที่ผ่านตัว Load Balancer
        access_log /usr/share/nginx/html/logs/access.log;

        # เส้นทางเสิร์ฟไฟล์ log ให้ React ดึงไปแสดงผล โดยไม่ต้องเก็บ log คำสั่งดึงเอง (เลี่ยง Loop)
        location /logs/ {
            root /usr/share/nginx/html;
            access_log off;
            default_type text/plain;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires 0;
            add_header Access-Control-Allow-Origin *;
        }

        # จุดจำลอง WAF Block (ยิงมานี่จะได้ Status 403 เสมอ)
        location /api/block-me {
            access_log /usr/share/nginx/html/logs/access.log;
            add_header Access-Control-Allow-Origin *;
            return 403 "Blocked by WAF Policy at Load Balancer.";
        }

        # การกระจายโหลดงาน (Load Balancing) ส่งไปที่กลุ่มเว็บบิลด์ด้านหลัง
        location / {
            proxy_pass http://web_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # แนบ Header บอกชื่อเครื่องปลายทางที่ให้บริการจริงกลับไปให้ Frontend ทราบ
            add_header X-Upstream-Address $upstream_addr always;
            add_header X-Upstream-Response-Time $upstream_response_time always;
        }
    }
}
